# Yerel geliştirme: PostgreSQL (appsettings ile aynı varsayılan kullanıcı/şifre)
# Başlat: docker compose up -d
# Sonra: Samplify.DbMigrator çalıştırın, ardından HttpApi.Host
services:
  postgres:
    image: postgres:16-alpine
    container_name: samplify-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Samplify
    ports:
      - "5432:5432"
    volumes:
      - samplify_pgdata:/var/lib/postgresql/data

volumes:
  samplify_pgdata:
